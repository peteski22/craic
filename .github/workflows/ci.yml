name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: team-ui/pnpm-lock.yaml

      - name: Sync dependencies
        run: |
          cd plugins/craic/server && uv sync --group dev
          cd ../../../team-api && uv sync --group dev
          cd ../team-ui && pnpm install --frozen-lockfile

      - name: Lint
        run: make lint

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: |
          cd plugins/craic/server && uv sync --group dev
          cd ../../../team-api && uv sync --group dev

      - name: Test
        run: make test
