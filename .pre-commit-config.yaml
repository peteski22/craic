repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets

  - repo: local
    hooks:
      - id: ty-check-server
        name: ty (server)
        entry: bash -c 'cd server && uvx ty check craic_mcp --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^server/
      - id: ty-check-team-api
        name: ty (team-api)
        entry: bash -c 'cd team-api && uvx ty check team_api --python .venv'
        language: system
        pass_filenames: false
        types: [python]
        files: ^team-api/

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.7
    hooks:
      - id: uv-lock
